<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WECANBR · Sistema Integrado</title>
<style>
  :root{--bg:#150a20;--surface:#211132;--surface2:#2c1740;--surface3:#38204e;
    --border:#432a5c;--accent:#63ccb0;--brand:#4f0672;--danger:#ef4444;
    --text:#efe9f7;--muted:#a394bf;--font:'Segoe UI',system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center}
  #login-page{position:fixed;inset:0;background:
    radial-gradient(circle at 18% 18%,rgba(99,204,176,.10),transparent 45%),
    radial-gradient(circle at 85% 80%,rgba(79,6,114,.35),transparent 55%),
    var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:24px}
  .login-box{width:420px;max-width:100%}
  .login-head{margin-bottom:26px}
  .login-head h1{font-size:28px;font-weight:800;letter-spacing:1px}
  .login-head .sub{color:var(--accent);font-size:14px;font-style:italic;margin-top:4px}
  .login-error{background:rgba(239,68,68,.1);border:1px solid var(--danger);color:var(--danger);
    padding:9px 12px;border-radius:8px;font-size:12.5px;margin-bottom:14px;display:none}
  .form-group{margin-bottom:14px}
  .form-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;
    text-transform:uppercase;letter-spacing:.4px}
  .form-group input{width:100%;background:var(--surface2);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;font-family:var(--font);outline:none}
  .form-group input:focus{border-color:var(--accent)}
  .btn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;
    font-family:var(--font);font-weight:700}
  .btn-primary{background:var(--accent);color:var(--brand);width:100%;margin-top:4px}
  .btn-primary:hover{background:#7adcc4}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed}
  .info{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    padding:10px 14px;font-size:11.5px;color:var(--muted);margin-top:18px;line-height:1.6}
  .info strong{color:var(--text)}
</style>
</head>
<body>
<div id="login-page">
  <div class="login-box">
    <div class="login-head">
      <h1>WECANBR</h1>
      <p class="sub">Sistema Integrado</p>
    </div>
    <div class="login-error" id="login-error"></div>
    <div class="form-group"><label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@wecanbr.com.br"/>
    </div>
    <div class="form-group"><label>Senha</label>
      <input type="password" id="login-senha" placeholder="••••••"/>
    </div>
    <button class="btn btn-primary" id="btn-entrar" onclick="fazerLogin()">Entrar</button>
    <div class="info"><strong>Acesso:</strong> use o e-mail e senha cadastrados pelo administrador.</div>
  </div>
</div>

<script src="shared.js"></script>
<script>
async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const senha = document.getElementById('login-senha').value;
  const err   = document.getElementById('login-error');
  const btn   = document.getElementById('btn-entrar');
  err.style.display = 'none';
  if (!email || !senha) { err.textContent='Informe e-mail e senha.'; err.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Entrando…';
  try {
    const resp = await rpc('wc_login', { p_email:email, p_senha:senha });
    salvarSessao(resp.sessao);
    window.location.href = 'admissao.html';
  } catch(e) {
    err.textContent = e.message || 'E-mail ou senha incorretos.';
    err.style.display = 'block';
  } finally { btn.disabled=false; btn.textContent='Entrar'; }
}
document.addEventListener('keydown', e => { if (e.key==='Enter') fazerLogin(); });
if (carregarSessaoSalva()) window.location.href = 'admissao.html';
</script>
</body>
</html>
